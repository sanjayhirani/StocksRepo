name: Apex Market Scan

on:
  schedule:
    - cron: '0 14 * * 1-5'
  workflow_dispatch:

jobs:
  scan_and_alert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Move Cache here: Restore old data BEFORE running the script
      - name: Cache Stock Data
        uses: actions/cache@v3
        with:
          path: data_cache
          # Change: Using run_number or a timestamp ensures a new cache is saved every time
          key: ${{ runner.os }}-stock-data-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-stock-data-

      - name: Install Python Dependencies
        run: |
          pip install --upgrade pip
          pip install yfinance pandas numpy gspread oauth2client \
                      requests lxml mplfinance matplotlib gspread-formatting

      - name: Run Apex Scanner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_CREDS: ${{ secrets.GOOGLE_CREDS }}
        run: python Apex_Stock_Scanner.py
