name: Apex Market Scan
on:
  schedule:
    - cron: '0 14 * * 1-5' # 9:00 AM EST, Monday-Friday
  workflow_dispatch:      # Manual trigger button

jobs:
  scan_and_alert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install yfinance pandas numpy gspread oauth2client matplotlib requests google-generativeai

      - name: Run Apex Scanner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_CREDS: ${{ secrets.GOOGLE_CREDS }} # Your JSON creds string
        run: python apex_scanner.py
