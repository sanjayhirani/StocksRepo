name: Apex Market Scan
on:
  schedule:
    - cron: '0 14 * * 1-5'
  workflow_dispatch:

jobs:
  scan_and_alert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install yfinance pandas numpy gspread oauth2client google-generativeai matplotlib requests lxml
          
      - name: Run Apex Scanner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_CREDS: ${{ secrets.GOOGLE_CREDS }}
        run: python Apex_Stock_Scanner.py
